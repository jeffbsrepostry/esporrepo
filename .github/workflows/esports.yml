name: Esports Auto Poster

on:
  schedule:
    - cron: "*/1 * * * *"   # her dakika
  workflow_dispatch:        # Actions'tan manuel çalıştırma

permissions:
  contents: write

concurrency:
  group: esports-state
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: Run poster
        env:
          PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python poster_esports.py

      # state.json vs. değişiklik olduysa commit+push
      - name: Commit state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git pull --rebase origin main
          git commit -m "Update state.json"
          git push origin HEAD:main
